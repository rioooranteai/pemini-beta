<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HP Diagnostic Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #161920;
  --bg3: #1c2029;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #e8eaf0;
  --text2: #8b90a0;
  --text3: #555a6a;
  --blue: #4f8ef7;
  --blue-dim: rgba(79,142,247,0.12);
  --blue-border: rgba(79,142,247,0.35);
  --green: #3ecf8e;
  --green-dim: rgba(62,207,142,0.1);
  --green-border: rgba(62,207,142,0.3);
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.1);
  --amber-border: rgba(245,166,35,0.3);
  --red: #f26c6c;
  --red-dim: rgba(242,108,108,0.1);
  --red-border: rgba(242,108,108,0.3);
  --radius: 10px;
  --radius-lg: 14px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

#app {
  width: 100%;
  max-width: 720px;
}

/* ─── SEARCH SCREEN ─── */
#search-screen { animation: fadeUp .35s ease; }

.app-header {
  text-align: center;
  margin-bottom: 32px;
}
.app-header .badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--blue-dim);
  border: 1px solid var(--blue-border);
  color: var(--blue);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .04em;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 14px;
  font-family: var(--mono);
}
.app-header h1 {
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -.02em;
}
.app-header p {
  font-size: 14px;
  color: var(--text2);
}

.search-wrap {
  position: relative;
  margin-bottom: 20px;
}
.search-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  pointer-events: none;
}
#search-input {
  width: 100%;
  padding: 12px 14px 12px 42px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
#search-input::placeholder { color: var(--text3); }
#search-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,142,247,.1); }

.result-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.result-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: border-color .18s, background .18s, transform .15s;
  user-select: none;
}
.result-card:hover { border-color: var(--blue-border); background: var(--bg3); transform: translateY(-1px); }
.result-card:active { transform: translateY(0); }
.r-icon {
  width: 36px; height: 36px;
  border-radius: 9px;
  background: var(--blue-dim);
  border: 1px solid var(--blue-border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
}
.r-text strong { font-size: 13px; font-weight: 500; color: var(--text); display: block; margin-bottom: 2px; }
.r-text span { font-size: 11px; color: var(--text2); line-height: 1.4; }
.r-arrow { margin-left: auto; color: var(--text3); font-size: 14px; flex-shrink: 0; }

/* ─── DIAGNOSTIC SCREEN ─── */
#diag-screen { display: none; animation: fadeUp .3s ease; }

.diag-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.diag-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
}
.back-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  background: none;
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text2);
  font-size: 12px;
  font-family: var(--font);
  cursor: pointer;
  transition: border-color .15s, color .15s;
}
.back-btn:hover { border-color: var(--border2); color: var(--text); }
.diag-title { font-size: 13px; font-weight: 500; color: var(--text); }
.diag-hint { margin-left: auto; font-size: 11px; color: var(--text3); font-family: var(--mono); }

.progress-track {
  height: 2px;
  background: var(--border);
}
.progress-fill {
  height: 100%;
  background: var(--blue);
  transition: width .4s ease;
  border-radius: 0;
}

.viewport {
  overflow: hidden;
  position: relative;
  height: 440px;
  cursor: grab;
}
.viewport:active { cursor: grabbing; }
.canvas {
  position: absolute;
  top: 0; left: 0;
  transition: transform .55s cubic-bezier(.4,0,.2,1);
  transform-origin: 0 0;
}
#wf { display: block; overflow: visible; }

/* ─── POPUP ─── */
#popup-host {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

.node-popup {
  position: absolute;
  pointer-events: auto;
  background: var(--bg3);
  border: 1px solid var(--blue-border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  width: 230px;
  animation: popIn .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
.node-popup h4 {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 5px;
  line-height: 1.4;
}
.node-popup p {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.55;
  margin-bottom: 12px;
}
.cpill {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  background: var(--bg2);
  color: var(--text);
  font-size: 12px;
  font-family: var(--font);
  cursor: pointer;
  text-align: left;
  margin-bottom: 6px;
  transition: border-color .15s, background .15s, color .15s;
}
.cpill:last-child { margin-bottom: 0; }
.cpill:hover { border-color: var(--blue); background: var(--blue-dim); color: var(--blue); }
.cpill-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text3);
  flex-shrink: 0;
  transition: background .15s;
}
.cpill:hover .cpill-dot { background: var(--blue); }

.result-popup {
  position: absolute;
  pointer-events: auto;
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  width: 230px;
  animation: popIn .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  border: 1px solid;
}
.result-popup.success { background: var(--bg3); border-color: var(--green-border); }
.result-popup.warning { background: var(--bg3); border-color: var(--amber-border); }
.result-popup.danger  { background: var(--bg3); border-color: var(--red-border); }
.result-popup .rp-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .04em;
  padding: 3px 8px;
  border-radius: 20px;
  margin-bottom: 8px;
  font-family: var(--mono);
}
.result-popup.success .rp-tag { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
.result-popup.warning .rp-tag { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-border); }
.result-popup.danger  .rp-tag { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red-border); }
.result-popup h4 { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.result-popup p  { font-size: 11px; color: var(--text2); line-height: 1.55; margin-bottom: 12px; }
.rp-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.rp-btn {
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  font-family: var(--font);
  transition: border-color .15s, color .15s;
  white-space: nowrap;
}
.rp-btn:hover { border-color: var(--blue); color: var(--blue); }
.rp-btn.primary {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}
.rp-btn.primary:hover { background: #3a7ce8; border-color: #3a7ce8; color: #fff; }

/* ─── FOOTER ─── */
.diag-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  background: var(--bg3);
}
.step-dots { display: flex; gap: 4px; align-items: center; }
.step-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border2);
  transition: background .3s, width .3s;
}
.step-dot.done { background: var(--blue); }
.step-dot.active { background: var(--blue); width: 16px; border-radius: 3px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes popIn {
  from { opacity: 0; transform: scale(.88) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes nodeReveal {
  from { opacity: 0; transform: scale(.8); }
  to   { opacity: 1; transform: scale(1); }
}
.node-reveal { animation: nodeReveal .3s cubic-bezier(.34,1.4,.64,1) forwards; }
</style>
</head>
<body>
<div id="app">

<!-- SEARCH SCREEN -->
<div id="search-screen">
  <div class="app-header">
    <div class="badge">⬡ diagnostic tool</div>
    <h1>HP Diagnostic Center</h1>
    <p>Pilih alur diagnostik sesuai masalah perangkat kamu</p>
  </div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Cari masalah... baterai, layar, kamera, wifi" autocomplete="off">
  </div>
  <div class="result-grid" id="result-list"></div>
</div>

<!-- DIAGNOSTIC SCREEN -->
<div id="diag-screen">
  <div class="diag-card">
    <div class="diag-header">
      <button class="back-btn" id="back-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        Kembali
      </button>
      <span class="diag-title" id="diag-title"></span>
      <span class="diag-hint" id="diag-hint">pilih jawaban →</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-bar" style="width:0%"></div></div>
    <div class="viewport" id="viewport">
      <div class="canvas" id="canvas">
        <svg id="wf" style="display:block;overflow:visible"></svg>
        <div id="popup-host"></div>
      </div>
    </div>
    <div class="diag-footer">
      <span id="step-label">langkah 0 / 0</span>
      <div class="step-dots" id="step-dots"></div>
    </div>
  </div>
</div>

</div>
<script>

const flows = [

      {id:"f3",label:"Bersihkan lensa kamera",body:"Gunakan kain microfiber bersih untuk membersihkan lensa. Jangan gunakan tisu biasa karena bisa menggores permukaan lensa.",type:"success"},

  },
  {
    id:"wifi", title:"Masalah WiFi", icon:"📶", desc:"Tidak terdeteksi, no internet, atau sering disconnect",
    nodes:[
      {id:"n1",label:"Gejala WiFi kamu?",desc:"Pilih kondisi yang paling sesuai dengan masalah WiFi yang sedang kamu alami",type:"question",choices:[{text:"Tidak terdeteksi sama sekali",next:"n2"},{text:"Konek tapi no internet",next:"n3"},{text:"Koneksi sering terputus",next:"n4"}]},
      {id:"n2",label:"Sudah toggle WiFi?",desc:"Matikan WiFi selama 5 detik dari panel notifikasi, lalu nyalakan kembali",type:"question",choices:[{text:"Sudah, masih tidak terdeteksi",next:"f1"},{text:"Belum coba itu",next:"f2"}]},
      {id:"n3",label:"Perangkat lain juga gagal?",desc:"Coba konek HP lain atau laptop ke jaringan WiFi yang sama untuk perbandingan",type:"question",choices:[{text:"Ya, semua perangkat gagal",next:"f3"},{text:"Tidak, hanya HP ini",next:"f4"}]},
      {id:"n4",label:"Disconnect saat layar mati?",desc:"Fitur hemat daya di beberapa HP bisa mematikan WiFi otomatis saat layar tidak aktif",type:"question",choices:[{text:"Ya, saat layar mati saja",next:"f5"},{text:"Terjadi kapan saja, acak",next:"f6"}]},
      {id:"f1",label:"Coba mode pesawat",body:"Aktifkan mode pesawat selama 30 detik, lalu matikan kembali dan restart HP. Jika masih tidak terdeteksi setelah restart, kemungkinan ada masalah pada chip WiFi.",type:"warning"},
      {id:"f2",label:"Toggle WiFi off/on",body:"Tarik panel notifikasi dan ketuk ikon WiFi untuk mematikannya, tunggu 5 detik, lalu nyalakan lagi. Ini biasanya menyelesaikan masalah scanning jaringan.",type:"success"},
      {id:"f3",label:"Masalah ada di router",body:"Coba restart router / modem dengan mencabut kabelnya selama 30 detik lalu sambungkan kembali. Jika masih bermasalah, hubungi provider internet kamu.",type:"warning"},
      {id:"f4",label:"Forget & reconnect",body:"Masuk ke Pengaturan > WiFi, ketuk nama jaringan yang bermasalah, pilih Lupakan Jaringan, lalu konek ulang dengan memasukkan password kembali.",type:"success"},
      {id:"f5",label:"Nonaktifkan WiFi sleep",body:"Masuk ke Pengaturan > WiFi > Pengaturan Lanjutan > WiFi tetap aktif saat tidur > Selalu aktif. Nama menu bisa berbeda tergantung merek HP.",type:"success"},
      {id:"f6",label:"Ganti channel WiFi",body:"Login ke admin router (biasanya 192.168.1.1) dan ganti channel WiFi ke channel 1, 6, atau 11 untuk frekuensi 2.4GHz. Interferensi channel sering jadi penyebab.",type:"warning"},
    ],
    edges:[
      {from:"n1",to:"n2",label:"Tdk terdeteksi"},{from:"n1",to:"n3",label:"No internet"},{from:"n1",to:"n4",label:"Disconnect"},
      {from:"n2",to:"f1",label:"Masih"},{from:"n2",to:"f2",label:"Belum"},
      {from:"n3",to:"f3",label:"Semua gagal"},{from:"n3",to:"f4",label:"Hanya ini"},
      {from:"n4",to:"f5",label:"Layar mati"},{from:"n4",to:"f6",label:"Kapan saja"},
    ]
  }
];

let activeFlow=null, activeNodeId=null, visitedPath=[], isFinished=false;

function buildLayout(flow) {
  const inDeg = {};
  flow.nodes.forEach(n => inDeg[n.id] = 0);
  flow.edges.forEach(e => inDeg[e.to] = (inDeg[e.to]||0)+1);
  const levels = {};
  const queue = flow.nodes.filter(n => inDeg[n.id]===0).map(n => n.id);
  queue.forEach(id => levels[id] = 0);
  let qi = 0;
  while(qi < queue.length) {
    const id = queue[qi++];
    flow.edges.filter(e => e.from===id).forEach(e => {
      levels[e.to] = levels[e.to]===undefined ? levels[id]+1 : Math.max(levels[e.to], levels[id]+1);
      if(!queue.includes(e.to)) queue.push(e.to);
    });
  }
  const lg = {};
  flow.nodes.forEach(n => { const lv=levels[n.id]??0; if(!lg[lv])lg[lv]=[]; lg[lv].push(n.id); });
  const maxLevel = Math.max(...Object.keys(lg).map(Number));
  const maxCols  = Math.max(...Object.values(lg).map(a=>a.length));
  const svgW = Math.max(660, maxCols*(NW+CGAP)+80);
  const pos = {};
  for(let lv=0; lv<=maxLevel; lv++) {
    const ids = lg[lv]||[];
    const totalW = ids.length*NW + (ids.length-1)*CGAP;
    const sx = (svgW-totalW)/2;
    ids.forEach((id,i) => { pos[id] = { x: sx+i*(NW+CGAP), y: 30+lv*(NH+RGAP), lv }; });
  }
  const svgH = 30+(maxLevel+1)*(NH+RGAP)+60;
  return { pos, svgW, svgH };
}

function renderSearch(q) {
  const list = document.getElementById("result-list");
  const f = q ? flows.filter(fl => (fl.title+fl.desc+fl.id).toLowerCase().includes(q.toLowerCase())) : flows;
  list.innerHTML = f.map(fl => `
    <div class="result-card" onclick="openFlow('${fl.id}')">
      <div class="r-icon">${fl.icon}</div>
      <div class="r-text"><strong>${fl.title}</strong><span>${fl.desc}</span></div>
      <svg class="r-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </div>`).join("");
}

function openFlow(id) {
  activeFlow = flows.find(f => f.id===id);
  activeNodeId = activeFlow.nodes[0].id;
  visitedPath = [];
  isFinished = false;
  document.getElementById("search-screen").style.display="none";
  document.getElementById("diag-screen").style.display="block";
  document.getElementById("diag-title").textContent = activeFlow.title;
  document.getElementById("diag-hint").textContent = "pilih jawaban →";
  renderAll(false);
}

function getVisibleIds() {
  if(isFinished) return activeFlow.nodes.map(n=>n.id);
  const v = new Set([activeFlow.nodes[0].id]);
  visitedPath.forEach(s => { v.add(s.from); v.add(s.to); });
  return [...v];
}

function getVisibleEdges() {
  if(isFinished) return activeFlow.edges;
  return activeFlow.edges.filter(e => visitedPath.some(s => s.from===e.from && s.to===e.to));
}

function renderAll(animate) {
  const { pos, svgW, svgH } = buildLayout(activeFlow);
  const svg = document.getElementById("wf");
  svg.setAttribute("width", svgW);
  svg.setAttribute("height", svgH);
  const nodeMap = {};
  activeFlow.nodes.forEach(n => nodeMap[n.id]=n);
  const visibleIds   = getVisibleIds();
  const visibleEdges = getVisibleEdges();

  /* ── edges ── */
  let eh = "";
  (isFinished ? activeFlow.edges : visibleEdges).forEach(e => {
    const f=pos[e.from], t=pos[e.to];
    if(!f||!t) return;
    const x1=f.x+NW/2, y1=f.y+NH, x2=t.x+NW/2, y2=t.y;
    const active = visitedPath.some(s => s.from===e.from && s.to===e.to);
    const stroke = active ? "#4f8ef7" : "rgba(255,255,255,0.12)";
    const sw     = active ? 1.5 : 1;
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    eh += `<path d="M${x1} ${y1} C${x1} ${y1+32},${x2} ${y2-32},${x2} ${y2}" fill="none" stroke="${stroke}" stroke-width="${sw}" marker-end="url(#arr)"/>`;
    if(e.label){
      const px = mx + (active ? 3 : 0);
      eh += `<text x="${px}" y="${my}" text-anchor="middle" dominant-baseline="central" fill="${active?"#4f8ef7":"rgba(255,255,255,0.3)"}" font-family="'DM Mono',monospace" font-size="10" font-weight="${active?500:400}">${e.label}</text>`;
    }
  });

  /* ── nodes ── */
  let nh = "";
  (isFinished ? activeFlow.nodes.map(n=>n.id) : visibleIds).forEach(nid => {
    const n=nodeMap[nid], p=pos[nid];
    if(!n||!p) return;
    const isActive  = nid===activeNodeId && !isFinished;
    const isVisited = visitedPath.some(s=>s.from===nid||s.to===nid) || nid===activeFlow.nodes[0].id;
    const isFinish  = n.type!=="question";
    const isNew     = animate && nid===activeNodeId;

    let fill, stroke, textCol, sw;
    if(isActive){
      fill="#4f8ef7"; stroke="#7aafff"; textCol="#ffffff"; sw=1.5;
    } else if(isFinish && isVisited){
      if(n.type==="success"){fill="rgba(62,207,142,0.15)";stroke="rgba(62,207,142,0.5)";textCol="#3ecf8e";}
      else if(n.type==="warning"){fill="rgba(245,166,35,0.12)";stroke="rgba(245,166,35,0.45)";textCol="#f5a623";}
      else{fill="rgba(242,108,108,0.12)";stroke="rgba(242,108,108,0.45)";textCol="#f26c6c";}
      sw=1;
    } else if(isVisited){
      fill="rgba(79,142,247,0.12)"; stroke="rgba(79,142,247,0.4)"; textCol="#8fb8f9"; sw=1;
    } else {
      fill="rgba(255,255,255,0.03)"; stroke="rgba(255,255,255,0.12)"; textCol="rgba(255,255,255,0.35)"; sw=0.5;
    }

    const anim = isNew ? ` class="node-reveal"` : "";
    nh += `<g${anim}>
      <rect x="${p.x}" y="${p.y}" width="${NW}" height="${NH}" rx="8" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>
      <text x="${p.x+NW/2}" y="${p.y+NH/2}" text-anchor="middle" dominant-baseline="central" fill="${textCol}" font-family="'DM Sans',sans-serif" font-size="11.5" font-weight="${isActive||isVisited?500:400}">${n.label}</text>
    </g>`;
  });

  svg.innerHTML = `<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>${eh}${nh}`;

  renderPopup(pos, svgW, svgH);
  if(!isFinished) focusNode(pos[activeNodeId], svgW, svgH);
  else showFull(pos, svgW, svgH);
  updateFooter();
}

function focusNode(p, svgW, svgH) {
  if(!p) return;
  const scale = 1;
  const tx = VW/2 - (p.x+NW/2)*scale;
  const ty = Math.max(20, VH/2 - (p.y+NH/2)*scale);
  document.getElementById("canvas").style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}

function showFull(pos, svgW, svgH) {
  const scaleX = (VW-32)/svgW;
  const scaleY = (VH-32)/svgH;
  const scale  = Math.min(scaleX, scaleY, 1);
  const tx = (VW - svgW*scale)/2;
  const ty = Math.max(10, (VH - svgH*scale)/2);
  document.getElementById("canvas").style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}

function renderPopup(pos, svgW, svgH) {
  const host = document.getElementById("popup-host");
  if(isFinished){ host.innerHTML=""; return; }
  const node = activeFlow.nodes.find(n => n.id===activeNodeId);
  if(!node) return;
  const p = pos[activeNodeId];
  if(!p) return;

  /* node center in screen space (based on focusNode transform) */
  const scale = 1;
  const canvasTx = VW/2 - (p.x+NW/2)*scale;
  const canvasTy = Math.max(20, VH/2 - (p.y+NH/2)*scale);
  const nodeCenterX = p.x*scale + canvasTx + (NW*scale)/2;
  const nodeCenterY = p.y*scale + canvasTy + (NH*scale)/2;

  const POPUP_W = 232;
  let left = nodeCenterX + NW/2 + 16;
  if(left + POPUP_W > VW-8) left = nodeCenterX - NW/2 - POPUP_W - 16;
  const top  = nodeCenterY - (node.type==="question"? 50 : 40);

  if(node.type==="question"){
    const ch = node.choices.map(c=>`<button class="cpill" onclick="pickChoice('${activeNodeId}','${c.next}')"><span class="cpill-dot"></span>${c.text}</button>`).join("");
    host.innerHTML=`<div class="node-popup" style="left:${left}px;top:${top}px;width:${POPUP_W}px"><h4>${node.label}</h4><p>${node.desc}</p>${ch}</div>`;
  } else {
    const tag = {success:"✓ Solusi ditemukan", warning:"⚠ Perlu perhatian", danger:"✕ Butuh servis"}[node.type];
    host.innerHTML=`<div class="result-popup ${node.type}" style="left:${left}px;top:${top}px;width:${POPUP_W}px">
      <span class="rp-tag">${tag}</span>
      <h4>${node.label}</h4>
      <p>${node.body}</p>
      <div class="rp-actions">
        <button class="rp-btn primary" onclick="revealFull()">Lihat full flow</button>
        <button class="rp-btn" onclick="resetFlow()">Ulang</button>
        <button class="rp-btn" onclick="goBack()">Menu</button>
      </div>
    </div>`;
  }
}

function pickChoice(fromId, toId) {
  visitedPath.push({ from:fromId, to:toId });
  activeNodeId = toId;
  const node = activeFlow.nodes.find(n => n.id===toId);
  if(node && node.type!=="question"){
    document.getElementById("diag-hint").textContent = "diagnosis selesai";
  }
  renderAll(true);
}

function revealFull() {
  isFinished = true;
  document.getElementById("diag-hint").textContent = "ringkasan alur";
  renderAll(false);
}

function updateFooter() {
  const totalQ  = activeFlow.nodes.filter(n => n.type==="question").length;
  const answered = visitedPath.length;
  const pct = Math.min(100, Math.round((answered/totalQ)*100));
  document.getElementById("prog-bar").style.width = pct+"%";
  document.getElementById("step-label").textContent = `langkah ${answered} / ${totalQ}`;
  const dots = document.getElementById("step-dots");
  dots.innerHTML = Array.from({length:totalQ},(_,i)=>`<span class="step-dot ${i<answered?"done":i===answered?"active":""}"></span>`).join("");
}

function resetFlow() {
  activeNodeId  = activeFlow.nodes[0].id;
  visitedPath   = [];
  isFinished    = false;
  document.getElementById("diag-hint").textContent = "pilih jawaban →";
  renderAll(false);
}

function goBack() {
  document.getElementById("search-screen").style.display = "block";
  document.getElementById("diag-screen").style.display   = "none";
  document.getElementById("popup-host").innerHTML = "";
}

document.getElementById("search-input").addEventListener("input", e => renderSearch(e.target.value));
document.getElementById("back-btn").addEventListener("click", goBack);
renderSearch("");
</script>
